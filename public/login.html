<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CivicVoice AI</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">

<div class="toast-container" id="toastContainer"></div>

<!-- Navbar -->
<nav class="navbar" style="position:static;">
  <div class="container">
    <a href="/" class="nav-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#b30000"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
      CivicVoice <span>AI</span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/register" class="btn-nav">Register</a></li>
    </ul>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card">
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Home
    </a>

    <div class="auth-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your CivicVoice account</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span>*</span></label>
        <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        <div class="field-error" id="emailError" style="color:var(--danger);font-size:0.78rem;margin-top:0.25rem;display:none;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Password <span>*</span>
          <a href="#" style="float:right;font-size:0.78rem;font-weight:500;color:var(--primary);">Forgot?</a>
        </label>
        <div style="position:relative;">
          <input class="form-control" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" style="padding-right:2.8rem;" />
          <button type="button" id="togglePwd" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);" aria-label="Show/hide password">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="field-error" id="pwdError" style="color:var(--danger);font-size:0.78rem;margin-top:0.25rem;display:none;"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
        <span class="spinner" id="loginSpinner" style="display:none;"></span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</main>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const loginBtnText = document.getElementById('loginBtnText');
  const loginSpinner = document.getElementById('loginSpinner');

  // Show/hide password
  document.getElementById('togglePwd').addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
  });

  function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }
  function clearErrors() {
    ['emailError','pwdError'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
  }

  function showToast(msg, type = 'info') {
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
    tc.appendChild(t);
    setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 350); }, 4000);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    let valid = true;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('emailError', 'Please enter a valid email address'); valid = false;
    }
    if (!password) {
      showError('pwdError', 'Password is required'); valid = false;
    }
    if (!valid) return;

    loginBtn.disabled = true;
    loginBtnText.textContent = 'Signing in…';
    loginSpinner.style.display = 'inline-block';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('cvToken', data.token);
        localStorage.setItem('cvUser', JSON.stringify(data.user));
        showToast('Login successful! Redirecting…', 'success');
        setTimeout(() => { window.location.href = '/submit'; }, 800);
      } else {
        showToast(data.error || 'Login failed. Please check your credentials.', 'error');
      }
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
    } finally {
      loginBtn.disabled = false;
      loginBtnText.textContent = 'Sign In';
      loginSpinner.style.display = 'none';
    }
  });

  // Auto-focus
  emailInput.focus();
</script>
</body>
</html>
