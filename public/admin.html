<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — CivicVoice AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="admin-theme">
  <!-- Header -->
  <header class="site-header admin-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>CivicVoice <strong>AI</strong></span>
      </a>
      <nav class="header-nav">
        <a href="/" class="nav-link" data-i18n="nav_home">Home</a>
        <a href="/analytics" class="nav-link" data-i18n="nav_analytics">Analytics</a>
        <a href="/submit" class="nav-link" data-i18n="nav_submit">Submit</a>
      </nav>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" data-lang="hi" onclick="setLanguage('hi')">हिन्दी</button>
        <button class="lang-btn" data-lang="mr" onclick="setLanguage('mr')">मराठी</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-container">
      <div class="admin-page-header">
        <div>
          <h1 class="admin-title" data-i18n="admin_title">Admin Dashboard</h1>
          <p class="admin-sub" data-i18n="admin_sub">Manage and respond to civic complaints.</p>
        </div>
        <button id="refreshBtn" class="btn btn-dark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          <span data-i18n="btn_refresh">Refresh</span>
        </button>
      </div>

      <!-- Stats Cards -->
      <div id="statsGrid" class="admin-stats-grid"></div>

      <!-- Filters -->
      <div class="admin-filters">
        <input type="text" id="searchInput" class="admin-input" data-i18n-placeholder="placeholder_search" placeholder="Search by ID, title, category…" />
        <select id="filterStatus" class="admin-select">
          <option value="" data-i18n="filter_all_statuses">All Statuses</option>
          <option value="submitted" data-i18n="filter_submitted">Submitted</option>
          <option value="under_review" data-i18n="filter_under_review">Under Review</option>
          <option value="assigned" data-i18n="filter_assigned">Assigned</option>
          <option value="in_progress" data-i18n="filter_in_progress">In Progress</option>
          <option value="escalated" data-i18n="filter_escalated">Escalated</option>
          <option value="resolved" data-i18n="filter_resolved">Resolved</option>
          <option value="closed" data-i18n="filter_closed">Closed</option>
          <option value="rejected" data-i18n="filter_rejected">Rejected</option>
        </select>
        <select id="filterCategory" class="admin-select">
          <option value="" data-i18n="filter_all_categories">All Categories</option>
          <option value="water" data-i18n="filter_water">Water Supply</option>
          <option value="garbage" data-i18n="filter_garbage">Garbage</option>
          <option value="road" data-i18n="filter_road">Road Damage</option>
          <option value="electricity" data-i18n="filter_electricity">Electricity</option>
          <option value="parking" data-i18n="filter_parking">Illegal Parking</option>
          <option value="animals" data-i18n="filter_animals">Street Animals</option>
          <option value="washroom" data-i18n="filter_washroom">Public Washroom</option>
        </select>
        <select id="filterPriority" class="admin-select">
          <option value="" data-i18n="filter_all_priorities">All Priorities</option>
          <option value="critical" data-i18n="filter_critical">Critical</option>
          <option value="high" data-i18n="filter_high">High</option>
          <option value="medium" data-i18n="filter_medium">Medium</option>
          <option value="low" data-i18n="filter_low">Low</option>
        </select>
      </div>

      <!-- Table -->
      <div class="admin-table-wrapper">
        <table class="admin-table" id="complaintsTable">
          <thead>
            <tr>
              <th data-i18n="th_id">ID</th>
              <th data-i18n="th_title">Title / Description</th>
              <th data-i18n="th_category">Category</th>
              <th data-i18n="th_department">Department</th>
              <th data-i18n="th_priority">Priority</th>
              <th data-i18n="th_status">Status</th>
              <th data-i18n="th_date">Date</th>
              <th data-i18n="th_image">Image</th>
              <th data-i18n="th_actions">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9" class="table-empty" data-i18n="loading_complaints">Loading complaints…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  <script src="/js/i18n.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
