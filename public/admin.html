<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — CivicVoice AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="admin-theme">
  <!-- Header -->
  <header class="site-header admin-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>CivicVoice <strong>AI</strong></span>
      </a>
      <nav class="header-nav">
        <a href="/" class="nav-link" data-i18n="nav.home">Home</a>
        <a href="/analytics" class="nav-link" data-i18n="nav.analytics">Analytics</a>
        <a href="/submit" class="nav-link" data-i18n="nav.submit">Submit</a>
      </nav>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="hi">हिन्दी</button>
        <button class="lang-btn" data-lang="mr">मराठी</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-container">
      <div class="admin-page-header">
        <div>
          <h1 class="admin-title" data-i18n="admin.title">Admin Dashboard</h1>
          <p class="admin-sub" data-i18n="admin.sub">Manage and respond to civic complaints.</p>
        </div>
        <button id="refreshBtn" class="btn btn-dark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          <span data-i18n="admin.refreshBtn">Refresh</span>
        </button>
      </div>

      <!-- Stats Cards -->
      <div id="statsGrid" class="admin-stats-grid"></div>

      <!-- Filters -->
      <div class="admin-filters">
        <input type="text" id="searchInput" class="admin-input" placeholder="Search by ID, title, category…" data-i18n-placeholder="admin.searchPh" />
        <select id="filterStatus" class="admin-select">
          <option value="" data-i18n="admin.allStatuses">All Statuses</option>
          <option value="submitted">Submitted</option>
          <option value="under_review">Under Review</option>
          <option value="assigned">Assigned</option>
          <option value="in_progress">In Progress</option>
          <option value="escalated">Escalated</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
          <option value="rejected">Rejected</option>
        </select>
        <select id="filterCategory" class="admin-select">
          <option value="" data-i18n="admin.allCategories">All Categories</option>
          <option value="water">Water Supply</option>
          <option value="garbage">Garbage</option>
          <option value="road">Road Damage</option>
          <option value="electricity">Electricity</option>
          <option value="parking">Illegal Parking</option>
          <option value="animals">Street Animals</option>
          <option value="washroom">Public Washroom</option>
        </select>
        <select id="filterPriority" class="admin-select">
          <option value="" data-i18n="admin.allPriorities">All Priorities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <!-- Table -->
      <div class="admin-table-wrapper">
        <table class="admin-table" id="complaintsTable">
          <thead>
            <tr>
              <th data-i18n="admin.colId">ID</th>
              <th data-i18n="admin.colTitle">Title / Description</th>
              <th data-i18n="admin.colCategory">Category</th>
              <th data-i18n="admin.colDept">Department</th>
              <th data-i18n="admin.colPriority">Priority</th>
              <th data-i18n="admin.colStatus">Status</th>
              <th data-i18n="admin.colDate">Date</th>
              <th data-i18n="admin.colImage">Image</th>
              <th data-i18n="admin.colActions">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9" class="table-empty" data-i18n="admin.loading">Loading complaints…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  <script src="/js/i18n.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
