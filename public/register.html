<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CivicVoice AI</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">

<div class="toast-container" id="toastContainer"></div>

<nav class="navbar" style="position:static;">
  <div class="container">
    <a href="/" class="nav-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#b30000"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
      CivicVoice <span>AI</span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/login" class="btn-nav">Login</a></li>
    </ul>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card" style="max-width:460px;">
    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Home
    </a>

    <div class="auth-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>

    <h2>Create Account</h2>
    <p class="auth-sub">Join CivicVoice AI — your voice matters</p>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name <span>*</span></label>
        <input class="form-control" type="text" id="name" name="name" placeholder="John Doe" required autocomplete="name" />
        <div class="field-error" id="nameError" style="color:var(--danger);font-size:0.78rem;margin-top:0.25rem;display:none;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address <span>*</span></label>
        <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        <div class="field-error" id="emailError" style="color:var(--danger);font-size:0.78rem;margin-top:0.25rem;display:none;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone Number <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input class="form-control" type="tel" id="phone" name="phone" placeholder="+1 555 000 0000" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span>*</span></label>
        <div style="position:relative;">
          <input class="form-control" type="password" id="password" name="password" placeholder="Minimum 6 characters" required autocomplete="new-password" style="padding-right:2.8rem;" />
          <button type="button" id="togglePwd" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);" aria-label="Show/hide password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pwd-strength" id="pwdStrength" style="display:none;">
          <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwdFill"></div></div>
          <span class="pwd-strength-text" id="pwdStrengthText"></span>
        </div>
        <div class="field-error" id="pwdError" style="color:var(--danger);font-size:0.78rem;margin-top:0.25rem;display:none;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password <span>*</span></label>
        <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" />
        <div class="field-error" id="confirmError" style="color:var(--danger);font-size:0.78rem;margin-top:0.25rem;display:none;"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;" id="regBtn">
        <span id="regBtnText">Create Account</span>
        <span class="spinner" id="regSpinner" style="display:none;"></span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</main>

<script>
  const form = document.getElementById('registerForm');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirmPassword');
  const regBtn = document.getElementById('regBtn');
  const regBtnText = document.getElementById('regBtnText');
  const regSpinner = document.getElementById('regSpinner');
  const pwdStrength = document.getElementById('pwdStrength');
  const pwdFill = document.getElementById('pwdFill');
  const pwdStrengthText = document.getElementById('pwdStrengthText');

  document.getElementById('togglePwd').addEventListener('click', () => {
    passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
  });

  function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }
  function clearErrors() {
    ['nameError','emailError','pwdError','confirmError'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
  }
  function showToast(msg, type = 'info') {
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;
    tc.appendChild(t);
    setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 350); }, 4500);
  }

  // Password strength meter
  passwordInput.addEventListener('input', () => {
    const val = passwordInput.value;
    if (!val) { pwdStrength.style.display = 'none'; return; }
    pwdStrength.style.display = 'block';
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pcts = [20, 40, 60, 80, 100];
    const colors = ['#c0392b','#e67e22','#f1c40f','#2ecc71','#27ae60'];
    const labels = ['Very weak','Weak','Fair','Strong','Very strong'];
    pwdFill.style.width = pcts[score-1] + '%';
    pwdFill.style.background = colors[score-1];
    pwdStrengthText.textContent = labels[score-1];
    pwdStrengthText.style.color = colors[score-1];
  });

  // Check if redirected from successful register
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('registered') === '1') {
    showToast('Registration successful! Please sign in.', 'success');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmInput.value;

    let valid = true;
    if (!name) { showError('nameError', 'Full name is required'); valid = false; }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('emailError', 'Please enter a valid email address'); valid = false; }
    if (!password || password.length < 6) { showError('pwdError', 'Password must be at least 6 characters'); valid = false; }
    if (password !== confirmPassword) { showError('confirmError', 'Passwords do not match'); valid = false; }
    if (!valid) return;

    regBtn.disabled = true;
    regBtnText.textContent = 'Creating account…';
    regSpinner.style.display = 'inline-block';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Account created! Redirecting to login…', 'success');
        setTimeout(() => { window.location.href = '/login?registered=1'; }, 1200);
      } else {
        showToast(data.error || 'Registration failed. Please try again.', 'error');
      }
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
    } finally {
      regBtn.disabled = false;
      regBtnText.textContent = 'Create Account';
      regSpinner.style.display = 'none';
    }
  });

  document.getElementById('name').focus();
</script>
</body>
</html>
